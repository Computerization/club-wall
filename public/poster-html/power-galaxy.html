<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>世外汽车社 Power Galaxy · 招新海报</title>
<style>
  html, body { margin: 0; container-type: inline-size; background: #0a0a0c; }
  * { box-sizing: border-box; }

  :root {
    --red: #E10600;          /* F1 红 */
    --red-deep: #b00400;
    --black: #0a0a0c;
    --panel: #141418;
    --white: #ffffff;
    --grey: #b9bcc4;
  }

  .poster {
    position: relative;
    width: 100%;
    overflow: hidden;
    background:
      radial-gradient(130% 80% at 80% 0%, #20131a 0%, var(--black) 55%),
      var(--black);
    color: var(--white);
    font-family: "PingFang SC", "Microsoft YaHei", "Noto Sans SC", sans-serif;
    padding: clamp(22px, 6cqw, 40px) clamp(20px, 5.5cqw, 36px) clamp(22px, 6cqw, 40px);
  }

  /* 飞驰速度线：斜向掠过 */
  .speed { position: absolute; inset: 0; overflow: hidden; pointer-events: none; z-index: 0; }
  .speed i {
    position: absolute;
    height: 2px; width: 60%;
    background: linear-gradient(90deg, transparent, var(--red), transparent);
    opacity: .0;
    transform: skewX(-22deg);
    animation: zoom 3.2s linear infinite;
  }
  .speed i:nth-child(1){ top: 14%; animation-delay: 0s; }
  .speed i:nth-child(2){ top: 30%; animation-delay: .7s; width: 45%; }
  .speed i:nth-child(3){ top: 55%; animation-delay: 1.3s; width: 70%; }
  .speed i:nth-child(4){ top: 72%; animation-delay: .4s; width: 40%; }
  .speed i:nth-child(5){ top: 88%; animation-delay: 1.8s; width: 55%; }
  @keyframes zoom {
    0%   { left: -65%; opacity: 0; }
    10%  { opacity: .8; }
    90%  { opacity: .8; }
    100% { left: 105%; opacity: 0; }
  }
  /* 顶部红色斜带 */
  .stripe {
    position: absolute; z-index: 0;
    top: -14cqw; right: -10cqw;
    width: 60cqw; height: 26cqw;
    background: linear-gradient(90deg, var(--red), var(--red-deep));
    transform: skewY(-12deg);
    opacity: .9;
    filter: blur(.5px);
  }

  .inner { position: relative; z-index: 1; }

  /* 头部 */
  .head { display: flex; align-items: center; gap: clamp(12px,3.4cqw,22px); }
  .logo {
    width: clamp(64px, 16cqw, 110px);
    height: clamp(64px, 16cqw, 110px);
    border-radius: 50%;
    object-fit: cover;
    flex: none;
    border: 3px solid var(--red);
    box-shadow: 0 0 0 4px rgba(225,6,0,.18), 0 10px 24px rgba(0,0,0,.5);
  }
  .titles { min-width: 0; }
  .kicker {
    font-size: clamp(10px, 2cqw, 12.5px);
    letter-spacing: .42em; text-indent: .42em;
    color: var(--red);
    font-weight: 800;
  }
  .title-en {
    font-size: clamp(26px, 8.4cqw, 58px);
    font-weight: 900;
    font-style: italic;
    line-height: .96;
    letter-spacing: -.01em;
    margin-top: clamp(2px,.8cqw,5px);
    text-transform: uppercase;
    color: #fff;
    text-shadow: 0 3px 18px rgba(225,6,0,.35);
  }
  .title-cn {
    font-size: clamp(15px, 4.2cqw, 28px);
    font-weight: 800;
    letter-spacing: .14em;
    margin-top: clamp(2px,.8cqw,6px);
    color: var(--grey);
  }

  .slogan {
    margin: clamp(16px,4.2cqw,26px) 0 0;
    font-size: clamp(13px, 3cqw, 18px);
    font-style: italic;
    font-weight: 700;
    color: #fff;
  }
  .slogan b { color: var(--red); }

  /* 悬浮活动图卡片 */
  .gallery {
    margin: clamp(16px,4.4cqw,28px) 0 0;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: clamp(8px,2.2cqw,14px);
  }
  .shot {
    position: relative;
    border-radius: clamp(10px,2.4cqw,16px);
    overflow: hidden;
    background: #1c1c22;
    box-shadow: 0 14px 30px rgba(0,0,0,.55);
    border: 1px solid rgba(255,255,255,.08);
    aspect-ratio: 4 / 3;
    animation: floaty 5s ease-in-out infinite;
  }
  .shot:nth-child(1){ animation-delay: 0s; }
  .shot:nth-child(2){ animation-delay: .8s; }
  .shot:nth-child(3){ animation-delay: 1.5s; }
  .shot.wide { grid-column: 1 / -1; aspect-ratio: 16 / 7; }
  .shot img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .shot figcaption {
    position: absolute; left: 0; right: 0; bottom: 0;
    font-size: clamp(10px,2.2cqw,13px);
    font-weight: 700;
    padding: clamp(10px,2.6cqw,16px) clamp(8px,2.2cqw,12px) clamp(5px,1.4cqw,8px);
    background: linear-gradient(transparent, rgba(0,0,0,.82));
  }
  .shot figcaption b { color: var(--red); }
  @keyframes floaty { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-1.4cqw); } }

  /* 亮点 */
  .perks {
    margin: clamp(16px,4.4cqw,28px) 0 0;
    display: grid; gap: clamp(7px,1.8cqw,11px);
  }
  .perk {
    display: flex; align-items: baseline; gap: .7em;
    font-size: clamp(12.5px,2.7cqw,15.5px);
    color: #e9eaee;
    line-height: 1.45;
  }
  .perk::before {
    content: "›";
    color: var(--red);
    font-weight: 900;
    font-size: 1.25em;
    flex: none;
  }
  .perk b { color: #fff; font-weight: 800; }

  /* 底部联系 */
  .foot {
    margin: clamp(18px,5cqw,30px) 0 0;
    border-top: 1px solid rgba(255,255,255,.12);
    padding-top: clamp(14px,3.6cqw,22px);
    display: grid; gap: clamp(7px,1.8cqw,11px);
  }
  .foot .row { display: flex; align-items: baseline; gap: clamp(8px,2cqw,12px); font-size: clamp(12.5px,2.6cqw,15px); }
  .foot .k { flex: none; min-width: clamp(72px,20cqw,104px); color: var(--red); font-weight: 800; letter-spacing: .04em; }
  .foot .v { color: #fff; font-weight: 600; }
  .foot .v .mono {
    font-family: ui-monospace,"SF Mono",Menlo,monospace;
    background: #1c1c22; color: #fff;
    border: 1px solid rgba(255,255,255,.12);
    border-radius: 6px; padding: 2px 7px;
  }

  @media (prefers-reduced-motion: reduce) { * { animation: none !important; } }
</style>
</head>
