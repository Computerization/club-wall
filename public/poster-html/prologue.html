<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Prologue 动物保护社 · 招新海报</title>
<style>
  html, body { margin: 0; container-type: inline-size; background: #FFF7E4; }
  * { box-sizing: border-box; }

  :root {
    --yellow: #F6C453;       /* 主色：暖黄 */
    --yellow-deep: #EBA63A;
    --cream: #FFF7E4;        /* 奶白底 */
    --orange: #F08A4B;       /* 点缀橙 */
    --brown: #7A4A2B;        /* 描边棕（取自 logo 线条） */
    --ink: #5b3a22;
  }

  .poster {
    position: relative;
    width: 100%;
    overflow: hidden;
    background:
      radial-gradient(120% 90% at 50% -10%, #FFF3D2 0%, var(--cream) 60%);
    color: var(--ink);
    font-family: "PingFang SC", "Microsoft YaHei", "Noto Sans SC", sans-serif;
    padding: clamp(24px, 6.5cqw, 44px) clamp(20px, 6cqw, 38px) clamp(22px, 6cqw, 40px);
    text-align: center;
  }

  /* ---------- 背景流动的简笔画小动物 ---------- */
  .critters { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
  .critters svg { position: absolute; opacity: .5; }
  .c1 { left: 4%;  top: 16%;  width: 16cqw; color: var(--orange);     animation: drift 11s ease-in-out infinite; }
  .c2 { right: 5%; top: 9%;   width: 13cqw; color: var(--yellow-deep);animation: drift 9s ease-in-out infinite reverse; }
  .c3 { left: 7%;  bottom: 22%;width: 14cqw; color: var(--yellow-deep);animation: drift 13s ease-in-out infinite; }
  .c4 { right: 6%; bottom: 16%;width: 17cqw; color: var(--orange);    animation: drift 10s ease-in-out infinite reverse; }
  .c5 { right: 24%;top: 3%;   width: 9cqw;  color: var(--orange);      animation: drift 12s ease-in-out infinite; }
  @keyframes drift {
    0%   { transform: translate(0,0) rotate(-4deg); }
    50%  { transform: translate(0,-2.5cqw) rotate(4deg); }
    100% { transform: translate(0,0) rotate(-4deg); }
  }

  .inner { position: relative; z-index: 1; }

  /* 顶部荣誉徽章 */
  .honor {
    display: inline-flex; align-items: center; gap: .5em;
    font-size: clamp(11px, 2.1cqw, 13px);
    font-weight: 800; letter-spacing: .12em;
    color: var(--brown);
    background: #fff;
    border: 2px solid var(--yellow);
    border-radius: 99px;
    padding: clamp(5px,1.3cqw,8px) clamp(12px,3cqw,18px);
    box-shadow: 0 6px 16px rgba(235,166,58,.22);
    opacity: 0; animation: rise .8s ease-out .1s forwards;
  }

  /* logo + 社名作视觉中心 */
  .hero { margin-top: clamp(14px, 4cqw, 26px); }
  .logo {
    width: clamp(110px, 30cqw, 190px);
    height: auto;
    display: block; margin: 0 auto;
    filter: drop-shadow(0 10px 22px rgba(122,74,43,.18));
    animation: bob 4s ease-in-out infinite;
  }
  @keyframes bob { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-2cqw); } }

  .name-cn {
    margin: clamp(10px,2.6cqw,18px) 0 0;
    font-size: clamp(34px, 9.6cqw, 64px);
    font-weight: 900;
    letter-spacing: .03em;
    line-height: 1.04;
    color: var(--brown);
    text-shadow: 0 3px 0 #fff, 0 5px 14px rgba(235,166,58,.25);
    animation: bob 4.6s ease-in-out infinite;
  }
  .name-en {
    display: block;
    font-size: clamp(15px, 4cqw, 26px);
    font-weight: 800;
    letter-spacing: .26em;
    text-indent: .26em;
    margin-top: clamp(2px,.8cqw,6px);
    color: var(--yellow-deep);
  }
  .name-tag {
    display: inline-block;
    margin-top: clamp(6px,1.6cqw,10px);
    font-size: clamp(12px,2.4cqw,15px);
    font-weight: 700;
    color: var(--ink);
    opacity: .75;
  }

  /* slogan */
  .slogan {
    margin: clamp(16px,4.2cqw,28px) auto 0;
    display: inline-block;
    font-size: clamp(16px, 4cqw, 24px);
    font-weight: 800;
    color: #fff;
    background: linear-gradient(100deg, var(--yellow), var(--orange));
    border-radius: 99px;
    padding: clamp(8px,2.2cqw,14px) clamp(16px,4.4cqw,28px);
    box-shadow: 0 8px 20px rgba(240,138,75,.3);
    opacity: 0; animation: rise .8s ease-out .4s forwards;
  }

  /* 关注卡片 */
  .info {
    margin: clamp(20px,5cqw,34px) auto 0;
    max-width: 92%;
    display: grid;
    gap: clamp(8px,2cqw,12px);
    opacity: 0; animation: rise .8s ease-out .55s forwards;
  }
  .card {
    display: flex; align-items: center; justify-content: center; gap: .6em;
    background: #fff;
    border: 2px dashed var(--yellow);
    border-radius: clamp(12px,3cqw,18px);
    padding: clamp(9px,2.4cqw,15px) clamp(12px,3cqw,18px);
    font-size: clamp(12.5px,2.6cqw,15px);
  }
  .card .k { color: var(--yellow-deep); font-weight: 800; }
  .card .v { color: var(--ink); font-weight: 600; }
  .card .v .mono {
    font-family: ui-monospace,"SF Mono",Menlo,monospace;
    background: #FFF3D2; color: var(--brown);
    border-radius: 6px; padding: 2px 7px; font-weight: 700;
  }

  @keyframes rise { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  @media (prefers-reduced-motion: reduce) {
    * { animation: none !important; }
    .honor, .slogan, .info { opacity: 1 !important; }
  }
</style>
</head>
