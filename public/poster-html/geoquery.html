<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>图寻地理社 GeoQuery · 招新海报</title>
<style>
  html, body { margin: 0; container-type: inline-size; background: #fff; }
  * { box-sizing: border-box; }

  :root {
    --teal: #0E6E6E;        /* 品牌墨青 */
    --teal-deep: #0a5252;
    --teal-soft: #cfe6e4;
    --orange: #EE9A3C;      /* 品牌橙 */
    --ink: #1c2b2b;
    --paper: #ffffff;
  }

  .poster {
    position: relative;
    width: 100%;
    overflow: hidden;
    background: var(--paper);
    color: var(--ink);
    font-family: "PingFang SC", "Microsoft YaHei", "Noto Sans SC", sans-serif;
    /* 上下留白由内容撑开；站点会自适配 iframe 高度 */
    padding: clamp(22px, 6cqw, 40px) clamp(20px, 6cqw, 38px) clamp(20px, 5.5cqw, 36px);
  }

  /* ---------- 北疆线描装饰：等高线 / 雪山 / 河流，铺在底层 ---------- */
  .decor {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 0;
  }
  /* 流动的等高线 / 虚线路径 */
  .flow { animation: flow 9s linear infinite; }
  @keyframes flow { to { stroke-dashoffset: -200; } }
  .flow-slow { animation: flow 16s linear infinite; }

  /* ---------- 内容 ---------- */
  .inner { position: relative; z-index: 1; }

  .brandrow {
    display: flex;
    align-items: center;
    gap: clamp(10px, 3cqw, 18px);
    opacity: 0;
    animation: rise .9s ease-out .05s forwards;
  }
  .logo {
    width: clamp(46px, 10cqw, 64px);
    height: clamp(46px, 10cqw, 64px);
    border-radius: 50%;
    object-fit: cover;
    box-shadow: 0 6px 16px rgba(14,110,110,.18);
    flex: none;
  }
  .badge {
    font-size: clamp(10px, 2cqw, 12.5px);
    letter-spacing: .32em;
    color: var(--teal);
    font-weight: 700;
    border: 1px solid var(--teal-soft);
    border-radius: 99px;
    padding: clamp(5px, 1.2cqw, 8px) clamp(11px, 2.6cqw, 17px);
    text-indent: .32em;
  }

  h1 { margin: clamp(16px, 4.5cqw, 30px) 0 0; line-height: 1.04; }
  .title-cn {
    display: block;
    font-size: clamp(30px, 8cqw, 50px);
    font-weight: 800;
    color: var(--teal-deep);
    letter-spacing: .04em;
    opacity: 0;
    animation: rise .9s ease-out .15s forwards;
  }
  .title-en {
    display: block;
    font-size: clamp(19px, 4.6cqw, 32px);
    font-weight: 800;
    letter-spacing: .02em;
    margin-top: clamp(3px, 1cqw, 6px);
    background: linear-gradient(90deg, var(--orange), #f2b766);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    opacity: 0;
    animation: rise .9s ease-out .28s forwards;
  }
  .slogan {
    margin: clamp(12px, 3.5cqw, 22px) 0 0;
    font-size: clamp(14px, 3cqw, 18px);
    color: var(--teal);
    font-weight: 600;
    letter-spacing: .02em;
    opacity: 0;
    animation: rise .9s ease-out .4s forwards;
  }

  .intro {
    margin: clamp(16px, 4.5cqw, 28px) 0 0;
    font-size: clamp(12.5px, 2.5cqw, 15px);
    line-height: 1.8;
    color: #3a4a4a;
    max-width: 94%;
    opacity: 0;
    animation: rise .9s ease-out .5s forwards;
  }

  /* 亮点条 */
  .highlight {
    margin: clamp(18px, 5cqw, 30px) 0 0;
    position: relative;
    border-radius: clamp(12px, 2.6cqw, 18px);
    padding: clamp(15px, 4cqw, 26px) clamp(16px, 4.4cqw, 28px);
    background: linear-gradient(135deg, var(--teal-deep), var(--teal));
    color: #fff;
    overflow: hidden;
    opacity: 0;
    animation: rise .9s ease-out .58s forwards;
  }
  .highlight .pin {
    font-size: clamp(22px, 5cqw, 32px);
    line-height: 1;
    filter: drop-shadow(0 4px 8px rgba(0,0,0,.25));
  }
  .highlight .h-label {
    font-size: clamp(10px, 2cqw, 12px);
    letter-spacing: .3em;
    opacity: .8;
  }
  .highlight .h-main {
    font-size: clamp(17px, 4.2cqw, 26px);
    font-weight: 800;
    margin-top: clamp(4px, 1cqw, 7px);
    line-height: 1.2;
  }
  .highlight .h-main b { color: var(--orange); }
  .highlight .ring {
    position: absolute;
    right: -8cqw; top: -8cqw;
    width: 30cqw; height: 30cqw;
    border: 2cqw solid rgba(255,255,255,.12);
    border-radius: 50%;
  }

  /* 标签 */
  .tags {
    margin: clamp(18px, 5cqw, 30px) 0 0;
    display: flex;
    flex-wrap: wrap;
    gap: clamp(6px, 1.6cqw, 10px);
    opacity: 0;
    animation: rise .9s ease-out .66s forwards;
  }
  .tag {
    font-size: clamp(12px, 2.5cqw, 15px);
    font-weight: 700;
    color: var(--teal-deep);
    background: var(--teal-soft);
    border-radius: 99px;
    padding: clamp(5px, 1.3cqw, 8px) clamp(11px, 2.8cqw, 17px);
  }

  /* 底部联系信息 */
  .foot {
    margin: clamp(20px, 5.5cqw, 32px) 0 0;
    border-top: 1px dashed var(--teal-soft);
    padding-top: clamp(14px, 3.5cqw, 22px);
    display: grid;
    gap: clamp(8px, 2cqw, 13px);
    opacity: 0;
    animation: rise .9s ease-out .74s forwards;
  }
  .foot .row { display: flex; align-items: baseline; gap: clamp(8px, 2cqw, 12px); font-size: clamp(12.5px, 2.6cqw, 15px); }
  .foot .k {
    flex: none;
    min-width: clamp(74px, 20cqw, 108px);
    color: var(--teal);
    font-weight: 700;
    letter-spacing: .04em;
  }
  .foot .v { color: var(--ink); font-weight: 600; }
  .foot .v .mono {
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    background: #f1f7f6;
    border-radius: 6px;
    padding: 2px 7px;
    color: var(--teal-deep);
  }

  @keyframes rise {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @media (prefers-reduced-motion: reduce) {
    * { animation: none !important; }
    .brandrow, .title-cn, .title-en, .slogan, .intro,
    .highlight, .tags, .foot { opacity: 1 !important; }
  }
</style>
</head>

      </g>
    </svg>
