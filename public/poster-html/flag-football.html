<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>腰旗橄榄球社 · 招新海报</title>
<style>
  html, body { margin: 0; container-type: inline-size; background: #0E2233; }
  * { box-sizing: border-box; }
  :root {
    --grass: #1f7a4d;
    --grass-deep: #155c39;
    --grass-dark: #0f3f27;
    --line: rgba(255,255,255,.85);
    --orange: #FF8A3D;
    --orange-deep: #F06A12;
    --cream: #FFF6EC;
    --ink: #14202b;
  }
  .poster {
    position: relative; width: 100%; overflow: hidden;
    background:
      radial-gradient(120% 70% at 80% -10%, #2a99d9 0%, rgba(42,153,217,0) 55%),
      linear-gradient(168deg, #2176B6 0%, #1b5e96 42%, #15406a 100%);
    color: var(--cream);
    font-family: "PingFang SC", "Microsoft YaHei", "Noto Sans SC", sans-serif;
    padding: clamp(20px,5.5cqw,38px) clamp(20px,6cqw,38px) 0;
  }

  /* 悬浮装饰方块 */
  .blocks { position:absolute; inset:0; z-index:0; pointer-events:none; }
  .blk { position:absolute; border-radius:24%; }
  .blk1{ left:5%;  top:30%;  width:9cqw;  height:9cqw;  background:rgba(255,255,255,.10); animation:bob 5.2s ease-in-out infinite; }
  .blk2{ right:8%; top:9%;   width:6cqw;  height:6cqw;  background:var(--orange); opacity:.85; animation:bob 6.6s ease-in-out infinite reverse; }
  .blk3{ right:18%;top:33%;  width:4.5cqw;height:4.5cqw;background:rgba(255,255,255,.14); animation:bob 7.4s ease-in-out infinite; }
  @keyframes bob { 0%,100%{transform:translateY(0) rotate(0)} 50%{transform:translateY(-2.6cqw) rotate(14deg)} }

  /* 橄榄球抛物线传出（容器相对，自适应缩放） */
  .ball-wrap { position:absolute; left:0; top:clamp(40px,11cqw,80px); width:100%; z-index:1; pointer-events:none; }
  .ball { position:absolute; left:0; top:0; width:clamp(30px,7cqw,46px); height:clamp(19px,4.4cqw,29px);
    will-change: transform; animation: pass 4.6s cubic-bezier(.45,0,.55,1) infinite; }
  .ball b { position:absolute; inset:0; background:linear-gradient(90deg,var(--orange),var(--orange-deep));
    border-radius:50%; box-shadow:0 6px 14px rgba(0,0,0,.25); animation: spin 1.1s linear infinite; }
  .ball b::before { content:""; position:absolute; left:18%; right:18%; top:47%; height:9%; background:var(--cream); }
  .ball b::after  { content:""; position:absolute; left:46%; top:30%; bottom:30%; width:7%; background:var(--cream);
    box-shadow:-1.5cqw 0 var(--cream), 1.5cqw 0 var(--cream); }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes pass {
    0%   { transform: translate(4cqw, 4cqw)   rotate(-18deg); }
    25%  { transform: translate(26cqw, -7cqw) rotate(-10deg); }
    50%  { transform: translate(50cqw, -9cqw) rotate(-2deg); }
    75%  { transform: translate(72cqw, -2cqw) rotate(8deg); }
    100% { transform: translate(92cqw, 9cqw)  rotate(16deg); }
  }

  .inner { position:relative; z-index:2; }
  .scorebar { display:flex; align-items:center; gap:clamp(8px,2cqw,14px);
    opacity:0; animation:rise .8s ease-out .1s forwards; }
  .scorebar .pill { display:inline-flex; align-items:center; gap:.5em; font-size:clamp(10px,2cqw,12.5px);
    font-weight:800; letter-spacing:.22em; text-indent:.22em; color:#fff; background:var(--orange);
    border-radius:99px; padding:clamp(5px,1.3cqw,8px) clamp(13px,3.2cqw,19px); }
  .scorebar .down { margin-left:auto; font-size:clamp(9px,1.8cqw,11px); font-weight:800; letter-spacing:.18em;
    color:rgba(255,255,255,.6); }

  h1 { margin:clamp(18px,5cqw,30px) 0 0; line-height:1.02; }
  .title-cn { display:block; font-size:clamp(38px,12cqw,76px); font-weight:900; letter-spacing:.03em; color:#fff;
    text-shadow:0 4px 0 rgba(0,0,0,.18), 0 12px 26px rgba(0,0,0,.3);
    opacity:0; animation:rise .8s ease-out .2s forwards; }
  .title-en { display:block; margin-top:clamp(6px,1.6cqw,10px); font-size:clamp(15px,4cqw,25px); font-weight:800;
    letter-spacing:.06em; color:var(--orange); opacity:0; animation:rise .8s ease-out .32s forwards; }
  .intro { margin:clamp(16px,4.2cqw,26px) 0 0; font-size:clamp(13px,2.8cqw,16px); line-height:1.78;
    color:rgba(255,255,255,.86); max-width:92%; opacity:0; animation:rise .8s ease-out .44s forwards; }

  .tags { margin:clamp(18px,4.6cqw,28px) 0 0; display:flex; flex-wrap:wrap; gap:clamp(7px,1.8cqw,11px);
    opacity:0; animation:rise .8s ease-out .54s forwards; }
  .tag { font-size:clamp(13px,2.8cqw,16px); font-weight:800; color:#fff; border:2px solid rgba(255,255,255,.35);
    border-radius:99px; padding:clamp(6px,1.5cqw,9px) clamp(14px,3.4cqw,20px); }
  .tag.hot { color:#fff; background:linear-gradient(120deg,var(--orange),var(--orange-deep)); border-color:transparent;
    box-shadow:0 8px 16px rgba(240,106,18,.35); }

  .foot { margin:clamp(20px,5cqw,30px) 0 clamp(18px,5cqw,30px);
    display:flex; align-items:center; gap:.7em; font-size:clamp(13px,2.8cqw,16px);
    opacity:0; animation:rise .8s ease-out .62s forwards; }
  .foot .k { color:var(--orange); font-weight:800; }
  .foot .mono { font-family:ui-monospace,"SF Mono",Menlo,monospace; background:rgba(255,255,255,.12); color:#fff;
    border:2px solid rgba(255,255,255,.35); border-radius:8px; padding:3px 11px; font-weight:700; }

  /* 底部球场带 + 码线 + 奔跑剪影 */
  .field { position:relative; z-index:2; margin:0 calc(-1 * clamp(20px,6cqw,38px));
    height:clamp(86px,22cqw,150px); overflow:hidden;
    background:repeating-linear-gradient(90deg, var(--grass) 0 9.09%, var(--grass-deep) 9.09% 18.18%); }
  .field::before { content:""; position:absolute; inset:0;
    background:linear-gradient(0deg, rgba(0,0,0,.28), rgba(0,0,0,0) 60%); }
  .yard { position:absolute; top:0; bottom:0; width:2px; background:var(--line); opacity:.85; }
  .num { position:absolute; bottom:clamp(8px,2.4cqw,16px); transform:translateX(-50%);
    font-family:ui-monospace,Menlo,monospace; font-weight:800; color:rgba(255,255,255,.9);
    font-size:clamp(11px,2.6cqw,16px); letter-spacing:.05em; }
  .endzone { position:absolute; top:0; bottom:0; width:9.09%; background:var(--grass-dark); }
  .endzone.l { left:0; } .endzone.r { right:0; }
  .runner { position:absolute; bottom:clamp(6px,2cqw,14px); width:clamp(30px,8cqw,56px); color:#fff;
    filter:drop-shadow(0 3px 4px rgba(0,0,0,.35)); }
  .r1 { opacity:.95; animation:run 5.5s linear infinite; }
  .r2 { opacity:.55; transform:scaleX(.9); animation:run 7s linear infinite 1.4s; }
  @keyframes run { 0%{transform:translateX(-14cqw)} 100%{transform:translateX(112cqw)} }

  @keyframes rise { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
  @media (prefers-reduced-motion: reduce){ *{animation:none!important}
    .scorebar,.title-cn,.title-en,.intro,.tags,.foot{opacity:1!important}
    .ball{transform:translate(50cqw,-9cqw) rotate(-2deg)} }
</style>
</head>
<body>
  <div class="poster">
    <div class="blocks" aria-hidden="true">
      <span class="blk blk1"></span><span class="blk blk2"></span><span class="blk blk3"></span>
    </div>
    <div class="ball-wrap" aria-hidden="true"><div class="ball"><b></b></div></div>

    <div class="inner">
      <div class="scorebar">
        <span class="pill">FLAG FOOTBALL · WFLA</span>
        <span class="down">1ST &amp; 10 · JOIN US</span>
      </div>
      <h1>
        <span class="title-cn">腰旗橄榄球社</span>
        <span class="title-en">轻松 · 阳光 · 活力满场</span>
      </h1>
      <p class="intro">在日常训练里打磨基本功与战术理解 —— 没有激烈冲撞，只有奔跑、传球与默契。无论零基础还是老玩家，来这片场地一起跑起来！</p>
      <div class="tags">
        <span class="tag hot">对抗游戏</span>
        <span class="tag">基础训练</span>
        <span class="tag hot">活力向上</span>
        <span class="tag">快乐有趣</span>
      </div>
      <div class="foot">
        <span class="k">社长微信</span>
        <span class="mono">haoyunz0707</span>
      </div>
    </div>

    <div class="field" aria-hidden="true">
      <span class="endzone l"></span><span class="endzone r"></span>
      <span class="yard" style="left:18.18%"></span><span class="yard" style="left:27.27%"></span>
      <span class="yard" style="left:36.36%"></span><span class="yard" style="left:45.45%"></span>
      <span class="yard" style="left:54.54%"></span><span class="yard" style="left:63.63%"></span>
      <span class="yard" style="left:72.72%"></span><span class="yard" style="left:81.81%"></span>
      <span class="num" style="left:27.27%">10</span><span class="num" style="left:45.45%">30</span>
      <span class="num" style="left:54.54%">40</span><span class="num" style="left:72.72%">10</span>
      <svg class="runner r1" viewBox="0 0 64 64" fill="currentColor"><circle cx="40" cy="11" r="6.5"/><path d="M35 19q9 2 11 11l-4 3q-4-7-10-6l-13 9 7 10-5 13-6-2 4-13-10-11q-2-6 5-9z"/></svg>
      <svg class="runner r2" viewBox="0 0 64 64" fill="currentColor"><circle cx="40" cy="11" r="6.5"/><path d="M35 19q9 2 11 11l-4 3q-4-7-10-6l-13 9 7 10-5 13-6-2 4-13-10-11q-2-6 5-9z"/></svg>
    </div>
  </div>
</body>
</html>
