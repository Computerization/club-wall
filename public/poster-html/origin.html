<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Origin 起源社 · 招新海报</title>
<style>
  html, body { margin: 0; container-type: inline-size; background: #FF6F61; }
  * { box-sizing: border-box; }
  :root {
    --coral: #FF6F61;
    --coral-deep: #E8513F;
    --cream: #F7F1E8;
    --ink: #3a2420;
  }
  .poster {
    position: relative; width: 100%; overflow: hidden;
    background: linear-gradient(165deg, #FF7B6D 0%, var(--coral) 55%, #F26354 100%);
    color: var(--cream);
    font-family: "PingFang SC", "Microsoft YaHei", "Noto Sans SC", sans-serif;
    padding: clamp(28px, 7.5cqw, 52px) clamp(22px, 6.5cqw, 42px) clamp(24px, 6.5cqw, 44px);
    text-align: center;
  }
  /* 破冰：背景细裂纹缓慢延伸 */
  .ice { position:absolute; inset:0; z-index:0; pointer-events:none; opacity:.18; }
  .ice path { stroke: var(--cream); stroke-width:1.4; fill:none; stroke-dasharray:400; stroke-dashoffset:400;
    animation: crack 6s ease-out infinite; }
  .ice path:nth-child(2){ animation-delay:1.5s; } .ice path:nth-child(3){ animation-delay:3s; }
  @keyframes crack { 0%{stroke-dashoffset:400} 60%,100%{stroke-dashoffset:0} }

  .inner { position:relative; z-index:1; }
  .emblem { width: clamp(96px, 26cqw, 168px); height:auto; margin:0 auto; display:block;
    filter: drop-shadow(0 12px 26px rgba(120,30,20,.3)); animation: bob 5s ease-in-out infinite; }
  @keyframes bob { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-1.6cqw)} }

  .name { margin: clamp(12px,3.4cqw,22px) 0 0; font-size: clamp(34px,10cqw,66px); font-weight:900; letter-spacing:.04em; color: var(--cream);
    opacity:0; animation: rise .8s ease-out .15s forwards; }
  .name span { font-weight:800; }
  .name .cn { color:#FFE9DF; }

  /* slogan 主视觉 */
  .slogan { margin: clamp(16px,4.4cqw,28px) auto 0; max-width: 90%;
    opacity:0; animation: rise .8s ease-out .3s forwards; }
  .slogan .line { font-size: clamp(24px, 7.4cqw, 50px); font-weight:900; line-height:1.08; letter-spacing:.01em;
    color: var(--ink); }
  .slogan .line b { color: var(--cream); }
  .slogan .em { display:inline-block; background: var(--ink); color: var(--cream); padding: 0 .25em; border-radius: 4px; }

  .desc { margin: clamp(18px,4.8cqw,30px) auto 0; max-width: 92%; font-size: clamp(13px,2.8cqw,15.5px); line-height:1.85;
    color: #FFF1EA; opacity:0; animation: rise .8s ease-out .42s forwards; }

  .tags { margin: clamp(18px,4.6cqw,30px) 0 0; display:flex; flex-wrap:wrap; gap: clamp(7px,1.8cqw,11px); justify-content:center;
    opacity:0; animation: rise .8s ease-out .5s forwards; }
  .tag { font-size: clamp(12px,2.6cqw,15px); font-weight:800; color: var(--coral-deep); background: var(--cream);
    border-radius:99px; padding: clamp(6px,1.6cqw,10px) clamp(13px,3.2cqw,19px); }

  .foot { margin: clamp(22px,5.5cqw,34px) auto 0; max-width:92%; border-top: 2px solid rgba(247,241,232,.4);
    padding-top: clamp(14px,3.8cqw,22px); display:grid; gap: clamp(7px,1.8cqw,11px); font-size: clamp(12.5px,2.7cqw,15px);
    opacity:0; animation: rise .8s ease-out .58s forwards; }
  .foot .row { display:flex; justify-content:center; align-items:baseline; gap:.6em; flex-wrap:wrap; }
  .foot .k { color:#FFE0D6; font-weight:800; }
  .foot .v { color: var(--cream); font-weight:700; }
  .foot .mono { font-family: ui-monospace,"SF Mono",Menlo,monospace; background: var(--cream); color: var(--coral-deep);
    border-radius:6px; padding:2px 8px; font-weight:700; }

  @keyframes rise { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
  @media (prefers-reduced-motion: reduce){ *{animation:none!important} .name,.slogan,.desc,.tags,.foot{opacity:1!important} }
</style>
</head>
